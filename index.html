<!DOCTYPE html>
<html>
<head>
  <title>NEOSUN</title>
  <style>
    body {
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 60px;
    }

    h1 {
      font-size: 60px;
      letter-spacing: 10px;
      font-weight: 300;
    }

    p {
      color: #aaa;
      margin-bottom: 40px;
    }

    img {
      margin: 20px auto;
      display: block;
      max-width: 300px;
      filter: grayscale(100%);
      transition: 0.3s;
    }

    img:hover {
      filter: grayscale(0%);
      transform: scale(1.05);
    }

    a {
      color: #fff;
      text-decoration: none;
      border: 1px solid #fff;
      padding: 10px 20px;
      display: inline-block;
      margin: 10px;
      transition: 0.3s;
    }

    a:hover {
      background: #fff;
      color: #000;
    }
  </style>
</head>

<body>
  <h1>NEOSUN</h1>
  <p>music / fashion / emotion</p>

  <img src="logo.png" alt="logo">

  <h2>MERCH</h2>
  <img src="shirt1.png" alt="shirt">

  <div>
    <a href="#">YouTube</a>
    <a href="#">Instagram</a>
  </div>
</body>
</html>
